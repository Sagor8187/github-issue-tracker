<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-50">

    <!-- navbar section -->
    <section>
        <div class="navbar bg-base-100 shadow-sm flex flex-wrap md:flex-nowrap px-4 md:px-6 py-2">
            <div class="flex-1 flex items-center">
                <a class="btn btn-ghost text-xl flex items-center gap-2"><img class="h-7" src="./assets/github-logo.png" alt=""><span class="hidden sm:inline">GitHub Issues Tracker</span></a>
            </div>

            <div class="flex gap-2 flex-1 justify-end items-center mt-2 md:mt-0">
                <div class="relative flex-1 md:flex-none">
                    <i class="fa-solid fa-magnifying-glass absolute top-3 left-3 z-10 text-gray-400"></i>
                    <input onclick="searchdata()" id="input-data" type="text" placeholder="Search issues..." class="input input-bordered w-full md:w-64 pl-10" />
                </div>
                <div>
                    <button class="btn btn-primary whitespace-nowrap">+ New Issue</button>
                </div>
            </div>
        </div>
    </section>

    <section class="p-6 md:p-12 space-y-8">

        <!-- filter button section -->
        <div class="p-3 md:p-5 shadow-sm flex flex-wrap gap-2 md:gap-4 justify-start">
            <button id="all" onclick="tooglebtn('all')" class="btns btn btn-primary flex-1 md:flex-none px-4 md:px-9">All</button>
            <button id="open" onclick="tooglebtn('open')" class="btns btn flex-1 md:flex-none px-4 md:px-9">Open</button>
            <button id="close" onclick="tooglebtn('close')" class="btns btn flex-1 md:flex-none px-4 md:px-9">Close</button>
        </div>


        <!-- loading -->
        <section class="spiner flex justify-center hidden">
            <span class="loading loading-bars loading-xl"></span>
        </section>

        <!-- fetch from api load data count -->
        <div class="mt-1 mb-1 mx-auto">
            <div class="bg-white border border-gray-100 rounded-lg shadow-sm p-4 md:p-6 flex flex-col md:flex-row items-start md:items-center justify-between space-y-4 md:space-y-0">

                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-600">
                        <img src="./assets/Aperture.png" alt="">
                    </div>

                    <div>
                        <h2 class="text-xl font-bold text-slate-800"><span id="total-count"></span> Issues</h2>
                        <p class="text-gray-500 font-medium">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex items-center space-x-6">
                    <div class="flex items-center space-x-2">
                        <span class="w-3 h-3 bg-emerald-500 rounded-full"></span>
                        <span class="text-slate-800 font-medium">Open</span>
                    </div>

                    <div class="flex items-center space-x-2">
                        <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                        <span class="text-slate-800 font-medium">Closed</span>
                    </div>
                </div>
            </div>
        </div>


         <!-- loading -->
        <section  class="spiner flex justify-center hidden">
            <span class="loading loading-bars loading-xl"></span>
        </section>


        <!-- fetch load card -->
        <section id="card-section" class="p-2 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <!-- cards dynamically load here -->
        </section>

<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">


    <div class="modal-box">
      <div id="shwodata"></div>
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary float-right">Close</button>
      </form>
    </div>
    </div>
  </dialog>

    </section>

    <script src="./load.js"></script>
</body>

</html>
