<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Tracking system</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="min-h-screen  bg-slate-100 flex items-center justify-center p-4 font-sans">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-8 sm:p-12">
    
    <div class="flex flex-col items-center mb-8">
      <div class="w-24 h-24 mb-4">
        <img src="./assets/github-logo.png" alt="">
      </div>
      <h1 class="text-3xl font-bold text-slate-800 tracking-tight">GitHub Issues Tracker</h1>
      <p class="text-slate-500 mt-1">Sign in to manage your issues</p>
    </div>

    <form class="space-y-6">
      <div>
        <label class="block text-slate-800 font-semibold mb-2">Username</label>
        <input id="user-name" type="text" placeholder="Enter Username" 
               class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition duration-200">
        <p class="text-sm text-blue-600 mt-1.5">Default: admin</p>
      </div>

      <div>
        <label class="block text-slate-800 font-semibold mb-2">Password</label>
        <input id="login-pass" type="password" placeholder="Enter Password" 
               class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition duration-200">
        <p class="text-sm text-blue-600 mt-1.5">Default: admin123</p>
      </div>

      <button id="login-btn" 
              class="w-full bg-[#4f00ff] hover:bg-[#4000d1] text-white font-bold py-4 rounded-xl transition duration-300 shadow-lg active:scale-[0.98]">
        Sign In
      </button>
    </form>

    <div class="relative flex py-8 items-center">
        <div class="flex-grow border-t border-slate-200"></div>
        <span class="flex-shrink mx-4 text-slate-400 text-sm">OR</span>
        <div class="flex-grow border-t border-slate-200"></div>
    </div>

    <div class="text-center">
      <p class="text-slate-500 text-sm mb-3">Demo Credentials:</p>
      <div class="bg-slate-50 rounded-xl p-6 border border-slate-100">
        <p class="text-slate-800"><span class="font-bold">Username:</span> admin</p>
        <p class="text-slate-800"><span class="font-bold">Password:</span> admin123</p>
      </div>
    </div>

    

  </div>
</div>

<script src="./login.js"></script>
</body>
</html>
